name = "Strawberry"
grammar = "strawberry"
path_suffixes = ["str"]
line_comments = ["// "]
tab_size = 4
hard_tabs = false

language_servers = ["strc"]

brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] }
]
